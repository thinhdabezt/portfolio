<svg width="400" height="400" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- Tail -->
  <rect x="13" y="9" width="1" height="3" fill="#A855F7" />
  <rect x="14" y="8" width="1" height="3" fill="#A855F7" />
  
  <!-- Body -->
  <rect x="4" y="8" width="9" height="5" fill="#A855F7" />
  <rect x="5" y="7" width="7" height="1" fill="#A855F7" />
  
  <!-- Head -->
  <rect x="6" y="3" width="6" height="5" fill="#A855F7" />
  
  <!-- Ears -->
  <rect x="6" y="2" width="1" height="1" fill="#A855F7" />
  <rect x="11" y="2" width="1" height="1" fill="#A855F7" />
  
  <!-- Eyes -->
  <rect x="7" y="4" width="1" height="1" fill="#000" />
  <rect x="10" y="4" width="1" height="1" fill="#000" />
  
  <!-- Nose/Mouth -->
  <rect x="8" y="6" width="2" height="1" fill="#FFB6C1" />
  
  <!-- Feet -->
  <rect x="4" y="13" width="2" height="1" fill="#7C3AED" />
  <rect x="11" y="13" width="2" height="1" fill="#7C3AED" />
  
  <!-- Highlights/Sparkles -->
  <rect x="2" y="4" width="1" height="1" fill="#A855F7" opacity="0.6" />
  <rect x="14" y="3" width="1" height="1" fill="#A855F7" opacity="0.6" />
  <rect x="1" y="10" width="1" height="1" fill="#A855F7" opacity="0.4" />
</svg>
